name: Daily Collection

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC (11:30 IST)
  workflow_dispatch: {}    # manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: daily-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect new content
        run: |
          python src/youtube_collector.py
          python src/instagram_collector.py

      - name: Clean and rebuild unified dataset
        run: |
          python src/data_cleaner.py data/raw/youtube_master_dataset.csv --output-dir data/clean
          python src/data_cleaner.py data/raw/instagram_master_dataset.csv --output-dir data/clean
          python src/build_unified_dataset.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "daily collection update"
            git push
          fi
